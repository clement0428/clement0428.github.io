<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1336 724" width="1336" height="724" role="img" aria-label="O2O3 real greenhouse floor plan">
  <defs>
    <pattern id="pinkRows" width="21" height="16" patternUnits="userSpaceOnUse">
      <rect x="10" y="0" width="4" height="16" rx="2" fill="#ff25ff"/>
    </pattern>
    <pattern id="greenRows" width="18" height="16" patternUnits="userSpaceOnUse">
      <rect x="0" y="6" width="18" height="3" rx="1.5" fill="#12a536"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8a6f55"/>
    </marker>
    <style>
      .bg{fill:#c2c9d2}
      .bed{fill:#a5b9c3;stroke:#08202a;stroke-width:3}
      .aisle{fill:none;stroke:#0b1e28;stroke-width:3}
      .dim{stroke:#8a6f55;stroke-width:1.5;marker-start:url(#arrow);marker-end:url(#arrow)}
      .dimText{font:700 13px Arial,sans-serif;fill:#8a6f55}
      .label{font:700 26px Arial,"Microsoft JhengHei",sans-serif;fill:white;text-anchor:middle;dominant-baseline:middle}
      .small{font-size:22px}
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1336" height="724"/>

  <g opacity=".95">
    <line class="dim" x1="70" y1="40" x2="1230" y2="40"/>
    <text class="dimText" x="650" y="33" text-anchor="middle">88</text>
    <line class="dim" x1="70" y1="70" x2="650" y2="70"/>
    <text class="dimText" x="360" y="62" text-anchor="middle">48</text>
    <line class="dim" x1="700" y1="70" x2="1230" y2="70"/>
    <text class="dimText" x="965" y="62" text-anchor="middle">44</text>
    <line class="dim" x1="36" y1="102" x2="36" y2="668"/>
    <text class="dimText" x="27" y="388" transform="rotate(-90 27 388)" text-anchor="middle">48</text>
    <line class="dim" x1="1300" y1="102" x2="1300" y2="668"/>
    <text class="dimText" x="1312" y="386" transform="rotate(-90 1312 386)" text-anchor="middle">36</text>
    <line class="dim" x1="70" y1="715" x2="1082" y2="715"/>
    <text class="dimText" x="576" y="706" text-anchor="middle">83.5</text>
    <line class="dim" x1="1082" y1="715" x2="1230" y2="715"/>
    <text class="dimText" x="1156" y="706" text-anchor="middle">12.5</text>
    <line class="dim" x1="650" y1="298" x2="1082" y2="298"/>
    <text class="dimText" x="866" y="290" text-anchor="middle">35.50</text>
  </g>

  <g>
    <rect class="bed" x="72" y="88" width="286" height="290"/>
    <rect x="92" y="108" width="246" height="242" fill="url(#pinkRows)" opacity=".9"/>
    <text class="label" x="215" y="222">E區</text>
    <text class="label small" x="215" y="252">(R6-R11)</text>

    <rect class="bed" x="367" y="88" width="286" height="290"/>
    <rect x="387" y="108" width="246" height="242" fill="url(#pinkRows)" opacity=".9"/>
    <text class="label" x="510" y="222">F區</text>
    <text class="label small" x="510" y="252">(R1-R5)</text>

    <rect class="bed" x="724" y="102" width="506" height="122"/>
    <rect x="744" y="112" width="466" height="98" fill="url(#greenRows)" opacity=".95"/>
    <text class="label small" x="977" y="163">育苗區</text>

    <rect class="bed" x="72" y="403" width="253" height="265"/>
    <rect x="94" y="418" width="209" height="226" fill="url(#pinkRows)" opacity=".9"/>
    <text class="label" x="198" y="496">D區</text>
    <text class="label small" x="198" y="526">(L17-L21)</text>

    <rect class="bed" x="325" y="403" width="244" height="265"/>
    <rect x="347" y="418" width="200" height="226" fill="url(#pinkRows)" opacity=".9"/>
    <text class="label" x="447" y="496">C區</text>
    <text class="label small" x="447" y="526">(L12-L16)</text>

    <rect class="bed" x="568" y="403" width="247" height="265"/>
    <rect x="590" y="418" width="203" height="226" fill="url(#pinkRows)" opacity=".9"/>
    <text class="label" x="691" y="496">B區</text>
    <text class="label small" x="691" y="526">(L7-L11)</text>

    <rect class="bed" x="815" y="403" width="267" height="265"/>
    <rect x="837" y="418" width="223" height="226" fill="url(#pinkRows)" opacity=".9"/>
    <text class="label" x="948" y="496">A區</text>
    <text class="label small" x="948" y="526">(L1-L6)</text>
  </g>

  <path class="aisle" d="M653 88 v290 h-581 v25 h1010 v-156 h148 v421 h-148"/>
  <rect x="1082" y="520" width="148" height="148" fill="#a5b9c3" stroke="#08202a" stroke-width="3"/>
  <text class="label small" x="1156" y="590">機房</text>

  <g opacity=".45">
    <line x1="650" y1="72" x2="650" y2="246" stroke="#8a6f55" stroke-width="2"/>
    <line x1="700" y1="72" x2="700" y2="246" stroke="#8a6f55" stroke-width="2"/>
    <line x1="1230" y1="88" x2="1230" y2="224" stroke="#8a6f55" stroke-width="2"/>
    <line x1="72" y1="88" x2="72" y2="668" stroke="#8a6f55" stroke-width="2"/>
  </g>
</svg>
